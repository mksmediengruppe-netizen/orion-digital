server {
    listen 80;
    server_name orion.mksitdev.ru;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name orion.mksitdev.ru;
    ssl_certificate /etc/letsencrypt/live/orion.mksitdev.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orion.mksitdev.ru/privkey.pem;
    root /var/www/orion/frontend-new/dist;
    index index.html;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    location ~* \.(js|css|html)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    # CDN — public file serving (no auth required)
    location ^~ /files/ {
        alias /var/www/orion/backend/generated/;
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }
    # Audit files — direct access
    location ^~ /audit/ {
        alias /var/www/html/audit/;
        autoindex on;
        default_type text/plain;
        add_header Content-Type "text/plain; charset=utf-8";
    }
    # noVNC WebSocket for browser takeover — ^~ has priority over regex
    location ^~ /novnc/ {
        proxy_pass http://127.0.0.1:6080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        # Allow iframe embedding for noVNC
        add_header X-Frame-Options "";
        add_header Content-Security-Policy "";
    }
    location /api/ {
        proxy_pass http://127.0.0.1:3510;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1800s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 1800s;
        chunked_transfer_encoding on;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        client_max_body_size 100M;
        keepalive_timeout 1800s;
    }
    location = /robots.txt {
        alias /var/www/orion/frontend-new/dist/robots.txt;
        add_header Content-Type "text/plain; charset=utf-8";
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}