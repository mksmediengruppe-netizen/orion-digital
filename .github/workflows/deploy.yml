name: ORION CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  SERVER_HOST: 2.56.240.170
  DEPLOY_PATH: /var/www/orion

jobs:
  # ── Lint & Test ──
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install flask gunicorn openai requests pytest
          pip install flake8 black

      - name: Lint Python
        run: |
          flake8 backend/ --max-line-length=120 --ignore=E501,W503,E402 --count
        continue-on-error: true

      - name: Run unit tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short 2>/dev/null || echo "No tests found, skipping"

  # ── Build Frontend ──
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: |
          cd frontend-new
          npm install

      - name: Build frontend
        run: |
          cd frontend-new
          npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend-new/dist/

  # ── Deploy to Production ──
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-new/dist/

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "=== ORION Deploy Started ==="
            cd ${{ env.DEPLOY_PATH }}

            # Backup current version
            BACKUP_DIR="data/backups/deploy_$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$BACKUP_DIR"
            cp -r backend/app.py "$BACKUP_DIR/" 2>/dev/null || true

            # Pull latest code
            git pull origin main || git pull origin master

            # Install new Python dependencies
            source backend/venv/bin/activate
            pip install -r backend/requirements.txt 2>/dev/null || true

            # Build frontend if needed
            cd frontend-new
            npm install --production
            npm run build
            cd ..

            # Restart services
            systemctl restart orion-backend
            sleep 3

            # Health check
            for i in 1 2 3 4 5; do
              if curl -s http://127.0.0.1:3510/api/health | grep -q "ok"; then
                echo "=== Health check passed ==="
                exit 0
              fi
              echo "Waiting for server... ($i/5)"
              sleep 2
            done

            echo "=== WARNING: Health check failed ==="
            exit 1

      - name: Notify success
        if: success()
        run: echo "Deployment successful!"

      - name: Notify failure
        if: failure()
        run: echo "Deployment failed! Check server logs."
